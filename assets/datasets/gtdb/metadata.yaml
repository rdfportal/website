title: GTDB
website: https://gtdb.ecogenomic.org/  
description: The Genome Taxonomy Database (GTDB) is a resource that provides a standardized taxonomy for bacterial and archaeal genomes based on genome phylogeny. This RDF dataset is generated by the RDF Portal based on data distributed by GTDB, representing the taxonomy and associated information in a semantic format to enable data integration and advanced querying across life science resources.
tags: ["Taxonomy", "Bacteria", "Archaea"]
