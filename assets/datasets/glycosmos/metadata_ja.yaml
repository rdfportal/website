title: GlyCosmos
website: https://glycosmos.org/
description: GlyCosmos は、糖鎖科学とライフサイエンスの統合を目的としたウェブポータルです。標準化情報、リポジトリ、および各種データリソースから構成されており、糖鎖および糖鎖関連の遺伝子、タンパク質、脂質、経路、疾患に関する情報を提供しています。
