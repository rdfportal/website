title: GlyCosmos
website: https://glycosmos.org/
description: GlyCosmos is a web portal that aims to integrate the glycosciences with the life sciences. It consists of standards, repositories, and data resources, providing information on glycans and glycan-related genes, proteins, lipids, pathways, and diseases.
