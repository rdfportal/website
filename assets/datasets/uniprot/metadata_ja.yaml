title: UniProt RDF
website: https://uniprot.org/
description: Universal Protein Resource（UniProt）は、タンパク質配列およびアノテーションデータのための包括的なリソースです。さまざまな生物種に由来するキュレーション済みおよび計算機的に付与されたデータを提供する、タンパク質情報の中核的なハブとして機能しています。本RDFデータセットは、UniProtデータをセマンティックな形式で表現することで、ライフサイエンス分野におけるデータ統合および高度なクエリを可能にします。
tags: [ Protein ]
