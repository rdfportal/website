title: UniProt RDF
website: https://uniprot.org/
description: The Universal Protein Resource (UniProt) is a comprehensive resource for protein sequence and annotation data. It is a central hub for protein information, providing curated and computationally annotated data from a wide range of organisms. This RDF dataset represents UniProt data in a semantic format to enable integration and advanced querying across life science resources.
