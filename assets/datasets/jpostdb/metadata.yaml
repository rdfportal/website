title: "jPOST databse RDF"
website: https://globe.jpostdb.org/
description: "jPOST database RDF is a public dataset that provides the contents of jPOSTdb, operated by the jPOST project, in RDF format. It contains dataset metadata, identified peptides, inferred proteins, and post-translational modifications (PTMs) derived from proteomics public data reanalyzed under standardized criteria."
