title: AMR portal RDF
website: https://www.ebi.ac.uk/amr
description: The Antimicrobial Resistance (AMR) Portal is a data resource for exploring AMR phenotype and genotype annotations, including antibiotic resistance phenotypes, AMR gene detection, and combined phenotype–genotype datasets. Developed through a collaboration between EMBL-EBI and Imperial College London, it provides large-scale AMR data in a reconciled and uniform format. This RDF dataset is independently generated by the the RDF Portal based on data distributed by the AMR Portal.
