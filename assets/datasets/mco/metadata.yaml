title: Mouse Chromosome Ontology (MCO)
website: https://biohackathon.org/resource/mco
description: The Mouse Chromosome Ontology (MCO) provides simple, stable, and version-aware URIs for semantically identifying mouse chromosomes in different mouse reference genome assemblies. MCO enables RDF datasets to describe chromosome-level genomic locations consistently across reference genome versions.
