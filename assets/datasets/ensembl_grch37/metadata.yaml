title: Ensembl RDF for human genome GRCh 37
website: https://www.ensembl.org
description: Ensembl is a collection of automatically annotated genome databases for vertebrates and a number of eukaryotes, integrated with all other relevant biological data available. This RDF dataset is generated by the RDF Portal based on files distributed by Ensembl, and contains only data for the human genome assembly GRCh37. For data on the human genome assembly GRCh38, please use the standard Ensembl RDF dataset.
