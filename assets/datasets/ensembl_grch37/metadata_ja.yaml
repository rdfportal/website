title: Ensembl RDF for human genome GRCh 37
website: https://www.ensembl.org
description: Ensemblは、脊椎動物および多様な真核生物を対象とした自動アノテーション付きゲノムデータベースの集合であり、関連するさまざまな生物学的データと統合されています。本RDFデータセットは、Ensemblから配布されているファイルを基にRDF Portalが独自に作成したものであり、ヒトゲノムアセンブリGRCh37のデータのみを含んでいます。ヒトゲノムアセンブリGRCh38のデータについては、通常のEnsembl RDFデータセットをご利用ください。
