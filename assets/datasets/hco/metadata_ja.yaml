title: Human Chromosome Ontology (HCO)
website: https://biohackathon.org/resource/hco
description: Human Chromosome Ontology（HCO）は、ヒト参照ゲノムの各バージョンにおける染色体を意味的に識別するための、シンプルで安定したURIを提供するオントロジーです。HCOを用いることで、RDFデータにおいて染色体レベルのゲノム位置を参照ゲノムのバージョンに応じて一貫して記述できます。
