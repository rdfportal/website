title: Human Chromosome Ontology (HCO)
website: https://biohackathon.org/resource/hco
description: The Human Chromosome Ontology (HCO) provides simple, stable, and version-aware URIs for semantically identifying human chromosomes in different human reference genome assemblies. HCO enables RDF datasets to describe chromosome-level genomic locations consistently across reference genome versions.
